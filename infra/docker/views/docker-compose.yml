name: traceoflight-views-stack

services:
  views:
    build:
      context: ../../..
      dockerfile: Dockerfile
    container_name: traceoflight-views
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DATABASE_URL: sqlite:/data/counter.db?mode=rwc
      PORT: ${VIEWS_PORT:-3000}
      RUST_LOG: ${RUST_LOG:-info}
      ALLOWED_USERNAMES: ${ALLOWED_USERNAMES:-TraceofLight}
      IP_HASH_SALT: ${IP_HASH_SALT}
    volumes:
      - traceoflight-views-data:/data
    expose:
      - "${VIEWS_PORT:-3000}"
    networks:
      edge:
        aliases:
          - views

volumes:
  traceoflight-views-data:
    name: traceoflight-views-data

networks:
  edge:
    external: true
    name: traceoflight-edge
